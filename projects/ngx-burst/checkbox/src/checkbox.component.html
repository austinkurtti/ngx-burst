<label class="ngxb-checkbox" [class.disabled]="disabled()">
    <!-- Fake checkbox -->
    <input type="checkbox" (change)="toggleCheck()"/>

    <!-- Real checkbox -->
    <fa-icon [class.checked]="checked" size="lg" [icon]="checked ? ['fas', 'check-square'] : ['far', 'square']"></fa-icon>
    <span>
        <ng-content></ng-content>
    </span>
</label>

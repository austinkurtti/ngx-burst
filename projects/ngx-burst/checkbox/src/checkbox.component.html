<label class="ngxb-checkbox" [class.disabled]="disabled()" (click)="toggleCheck()">
    <input type="checkbox"/>

    @if (checked) {
        <fa-icon class="checked" size="lg" [icon]="['fas', 'check-square']"></fa-icon>
    }
    @else {
        <fa-icon class="unchecked" size="lg" [icon]="['far', 'square']"></fa-icon>
    }
    <span>
        <ng-content></ng-content>
    </span>
</label>
